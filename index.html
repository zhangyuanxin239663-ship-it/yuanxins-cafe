<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuanxin's Café</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
:root{
  --bg:#0D0C0B;--border:rgba(255,255,255,0.08);--border-h:rgba(255,255,255,0.18);
  --text:#E8E2DA;--muted:#6A6259;--accent:#C8A97E;--dim:rgba(200,169,126,0.12);--danger:#B05040;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:22px 40px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,padding .3s;}
nav.sc{background:rgba(13,12,11,.92);backdrop-filter:blur(14px);padding:15px 40px;}
.logo{font-family:'EB Garamond',serif;font-style:italic;font-size:16px;letter-spacing:2px;color:var(--text);text-decoration:none;background:none;border:none;padding:0;cursor:pointer;}
.nav-r{display:flex;gap:10px;align-items:center;}
.btn-o{font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border);color:var(--muted);background:transparent;border-radius:2px;transition:all .2s;cursor:pointer;}
.btn-o:hover{border-color:var(--border-h);color:var(--text);}
.btn-s{font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;background:var(--accent);color:#0D0C0B;border:none;border-radius:2px;transition:opacity .2s;cursor:pointer;}
.btn-s:hover{opacity:.85;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;background-image:url('bg.jpg');background-size:cover;background-position:center 30%;position:relative;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(13,12,11,.4) 0%,rgba(13,12,11,.65) 60%,rgba(13,12,11,.95) 100%);}
.hero-inner{position:relative;z-index:1;}
.h-name{font-family:'EB Garamond',serif;font-size:clamp(56px,12vw,120px);font-weight:400;line-height:.9;color:#fff;letter-spacing:1px;opacity:0;animation:up 1s cubic-bezier(.16,1,.3,1) .3s forwards;}
.h-name em{font-style:italic;color:var(--accent);}
.h-div{width:28px;height:1px;background:var(--accent);margin:28px auto;opacity:0;animation:up .6s ease .8s forwards;}
.enter-btn{display:inline-flex;align-items:center;gap:12px;font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(17px,2.5vw,21px);color:rgba(232,226,218,.75);background:none;border:none;padding:0;transition:color .25s;letter-spacing:.5px;opacity:0;animation:up .6s ease 1s forwards;cursor:pointer;}
.enter-btn:hover{color:var(--accent);}
.enter-btn .arr{width:34px;height:34px;border-radius:50%;border:1px solid rgba(200,169,126,.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-style:normal;transition:all .3s;}
.enter-btn:hover .arr{background:var(--accent);border-color:var(--accent);color:#0D0C0B;transform:rotate(45deg);}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fp-wrap{max-width:680px;margin:0 auto;padding:80px 24px 100px;}
.fp-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.fp-title{font-family:'EB Garamond',serif;font-size:clamp(28px,5vw,46px);color:var(--text);}
.fp-title span{font-style:italic;color:var(--accent);}
.fp-count{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.compose{border:1px solid var(--border);padding:22px;margin-bottom:40px;background:rgba(255,255,255,.018);border-radius:2px;transition:border-color .25s;}
.compose:focus-within{border-color:rgba(200,169,126,.3);}
.c-top{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#3A2010,var(--accent));display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-size:13px;color:#fff;border:1px solid rgba(200,169,126,.2);overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.c-who{font-size:12px;letter-spacing:1px;color:var(--muted);}
.c-ta{width:100%;min-height:88px;font-family:'EB Garamond',serif;font-size:18px;line-height:1.7;background:transparent;border:none;color:var(--text);resize:none;outline:none;}
.c-ta::placeholder{color:rgba(232,226,218,.18);}
.c-ft{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.c-cnt{font-size:11px;color:var(--muted);}
.btn-pub{font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;background:var(--accent);color:#0D0C0B;border:none;border-radius:2px;transition:opacity .2s;cursor:pointer;}
.btn-pub:hover:not(:disabled){opacity:.85;}
.btn-pub:disabled{background:rgba(200,169,126,.18);color:rgba(13,12,11,.35);}
.aw{text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:2px;margin-bottom:40px;}
.aw p{font-family:'EB Garamond',serif;font-size:19px;font-style:italic;color:var(--muted);margin-bottom:18px;}
.post{padding:28px 0;border-bottom:1px solid var(--border);animation:up .4s ease both;}
.p-hd{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.p-meta{flex:1;}
.p-auth{font-family:'EB Garamond',serif;font-size:16px;color:var(--text);background:none;border:none;padding:0;transition:color .2s;text-align:left;cursor:pointer;}
.p-auth:hover{color:var(--accent);}
.p-time{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px;}
.p-body{font-family:'EB Garamond',serif;font-size:19px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:14px;}
.p-acts{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.pa{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:none;transition:color .2s;display:flex;align-items:center;gap:4px;padding:0;cursor:pointer;}
.pa:hover{color:var(--accent);}
.pa.lkd{color:var(--danger);}
.cmts-wrap{margin-top:14px;max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.16,1,.3,1);}
.cmts-wrap.open{max-height:3000px;}
.cmts-inner{padding-top:14px;padding-left:18px;border-left:1px solid rgba(200,169,126,.15);}
.cmt{padding:9px 0;border-bottom:1px solid var(--border);}
.cmt:last-child{border:none;}
.cmt-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.cmt-av{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#3A2010,var(--accent));display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-size:9px;color:#fff;overflow:hidden;border:1px solid rgba(200,169,126,.15);}
.cmt-av img{width:100%;height:100%;object-fit:cover;}
.cmt-auth{font-size:12px;color:var(--accent);}
.cmt-time{font-size:10px;letter-spacing:1px;color:var(--muted);margin-left:auto;}
.cmt-body{font-family:'EB Garamond',serif;font-size:16px;line-height:1.6;color:rgba(232,226,218,.65);}
.cmt-form{display:flex;gap:8px;align-items:center;margin-top:14px;}
.cmt-in{flex:1;padding:9px 12px;font-family:'EB Garamond',serif;font-size:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);outline:none;border-radius:2px;transition:border-color .2s;-webkit-appearance:none;}
.cmt-in::placeholder{color:rgba(232,226,218,.18);}
.cmt-in:focus{border-color:rgba(200,169,126,.35);}
.btn-cmt{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:9px 14px;background:transparent;border:1px solid var(--border);color:var(--accent);border-radius:2px;transition:all .2s;white-space:nowrap;cursor:pointer;}
.btn-cmt:hover{border-color:var(--accent);background:var(--dim);}
.no-cmt{font-family:'EB Garamond',serif;font-size:15px;font-style:italic;color:var(--muted);padding:6px 0;}
.sign-cmt{padding:8px 0;font-size:11px;letter-spacing:1px;color:var(--muted);}
.sign-cmt a{color:var(--accent);text-decoration:none;cursor:pointer;}
.nr{font-family:'EB Garamond',serif;font-size:19px;font-style:italic;color:var(--muted);text-align:center;padding:48px 0;}
.loading-msg{text-align:center;padding:48px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.spin{display:inline-block;width:13px;height:13px;border:1.5px solid rgba(232,226,218,.1);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:7px;}
@keyframes sp{to{transform:rotate(360deg)}}
.pp-wrap{max-width:640px;margin:0 auto;padding:80px 24px 100px;}
.pp-hero{display:flex;gap:24px;align-items:flex-start;padding-bottom:32px;border-bottom:1px solid var(--border);margin-bottom:36px;}
.pp-av{width:80px;height:80px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#3A2010,var(--accent));display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-size:28px;color:#fff;border:2px solid rgba(200,169,126,.25);overflow:hidden;}
.pp-av img{width:100%;height:100%;object-fit:cover;}
.pp-name{font-family:'EB Garamond',serif;font-size:clamp(24px,5vw,38px);color:var(--text);margin-bottom:4px;}
.pp-pron{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
.pp-bio{font-family:'EB Garamond',serif;font-size:16px;font-style:italic;color:rgba(232,226,218,.45);margin-bottom:14px;line-height:1.6;}
.pp-stats{display:flex;gap:20px;flex-wrap:wrap;}
.stat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.stat strong{display:block;font-family:'EB Garamond',serif;font-size:18px;font-weight:400;color:var(--accent);letter-spacing:0;}
.pp-sec{font-family:'EB Garamond',serif;font-size:17px;color:var(--muted);margin-bottom:6px;font-weight:400;}
.ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,4,3,.9);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;}
.ov.open{display:flex;animation:fi .25s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:#111009;border:1px solid var(--border);width:100%;max-width:420px;padding:40px 32px;position:relative;border-radius:3px;animation:su .35s cubic-bezier(.16,1,.3,1);max-height:92vh;overflow-y:auto;}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.mx{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;transition:color .2s;padding:4px;cursor:pointer;}
.mx:hover{color:var(--text);}
.m-title{font-family:'EB Garamond',serif;font-size:26px;color:var(--text);margin-bottom:3px;}
.m-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fg input,.fg textarea{width:100%;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);outline:none;border-radius:2px;transition:border-color .2s;resize:none;-webkit-appearance:none;}
.fg input:focus,.fg textarea:focus{border-color:rgba(200,169,126,.35);}
.btn-sub{width:100%;padding:13px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:3px;text-transform:uppercase;background:var(--accent);color:#0D0C0B;border:none;border-radius:2px;transition:opacity .2s;margin-top:6px;cursor:pointer;}
.btn-sub:hover:not(:disabled){opacity:.85;}
.btn-sub:disabled{background:rgba(200,169,126,.25);color:rgba(13,12,11,.35);}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.soc-row{display:flex;gap:8px;margin-bottom:4px;}
.s-btn{flex:1;padding:10px 6px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;letter-spacing:1px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);border-radius:2px;transition:all .2s;cursor:pointer;}
.s-btn:hover{background:rgba(255,255,255,.07);border-color:var(--border-h);}
.s-btn svg{width:13px;height:13px;}
.div-or{display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:2px;color:var(--muted);margin:18px 0;}
.div-or::before,.div-or::after{content:'';flex:1;height:1px;background:var(--border);}
.m-sw{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
.m-sw a{color:var(--accent);text-decoration:none;cursor:pointer;}
.av-edit{width:70px;height:70px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#3A2010,var(--accent));display:flex;align-items:center;justify-content:center;border:2px solid rgba(200,169,126,.25);position:relative;overflow:hidden;cursor:pointer;}
.av-edit img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.av-edit-txt{font-family:'EB Garamond',serif;font-size:22px;color:#fff;}
.av-edit::after{content:'Edit';position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0);color:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;}
.av-edit:hover::after{background:rgba(0,0,0,.55);color:#fff;}
.upw{position:relative;}
.upill{display:flex;align-items:center;gap:7px;padding:5px 13px 5px 5px;border:1px solid var(--border);border-radius:20px;transition:border-color .2s;cursor:pointer;}
.upill:hover{border-color:var(--border-h);}
.up-n{font-size:11px;letter-spacing:1px;color:var(--muted);}
.udrop{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#111009;border:1px solid var(--border);min-width:140px;z-index:250;border-radius:3px;overflow:hidden;}
.udrop.open{display:block;}
.di{display:block;width:100%;padding:10px 15px;text-align:left;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:1px solid var(--border);transition:all .2s;cursor:pointer;}
.di:last-child{border:none;}
.di:hover{color:var(--accent);background:var(--dim);}
.di.danger:hover{color:var(--danger);background:rgba(176,80,64,.08);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#111009;border:1px solid var(--border);color:var(--text);padding:10px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;z-index:400;opacity:0;transition:all .3s;pointer-events:none;border-radius:2px;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:540px){
  nav{padding:16px 18px;}nav.sc{padding:12px 18px;}
  .fp-wrap,.pp-wrap{padding:60px 16px 80px;}
  .modal{padding:30px 18px;}
  .pp-hero{flex-direction:column;align-items:center;text-align:center;}
  .pp-stats{justify-content:center;}
  .btn-o,.btn-s{padding:7px 12px;font-size:10px;}
}
</style>
</head>
<body>

<nav id="nav">
  <button class="logo" onclick="showPage('home')">yuanxin's café</button>
  <div class="nav-r" id="navAuth"></div>
</nav>

<div class="page active" id="homePage">
  <section class="hero">
    <div class="hero-inner">
      <h1 class="h-name">Yuanxin's<br><em>Café</em></h1>
      <div class="h-div"></div>
      <button class="enter-btn" onclick="goToFeelings()">
        share your feelings
        <span class="arr">→</span>
      </button>
    </div>
  </section>
</div>

<div class="page" id="feelingsPage">
  <div class="fp-wrap">
    <div class="fp-head">
      <h2 class="fp-title">Share Your <span>Feelings</span></h2>
      <span class="fp-count" id="pCount"></span>
    </div>
    <div id="cArea"></div>
    <div id="pFeed"></div>
  </div>
</div>

<div class="page" id="profilePage">
  <div class="pp-wrap" id="ppContent"></div>
</div>

<div class="ov" id="loginModal">
  <div class="modal">
    <button class="mx" onclick="closeModal('loginModal')">✕</button>
    <h2 class="m-title">Welcome back</h2>
    <p class="m-sub">Sign in</p>
    <div class="soc-row">
      <button class="s-btn" onclick="googleLogin()"><svg viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.2 7.2 0 0112 4.8c1.73 0 3.28.62 4.49 1.64l3.36-3.36A11.94 11.94 0 0012 .84C7.33.84 3.28 3.67 1.32 7.72l3.94 2.05z"/><path fill="#34A853" d="M16.21 18.63A7.17 7.17 0 0112 20.2a7.2 7.2 0 01-6.74-4.7l-3.95 2A11.95 11.95 0 0012 24c3.2 0 6.11-1.16 8.33-3.07l-4.12-2.3z"/><path fill="#FBBC05" d="M19.14 5.08l-3.36 3.36A7.15 7.15 0 0119.2 12c0 .88-.16 1.72-.44 2.5l4.08 2.28A11.9 11.9 0 0024 12c0-2.63-.84-5.07-2.26-7.07l-2.6.15z"/><path fill="#4285F4" d="M23.84 12c0-.75-.07-1.48-.2-2.19H12v4.14h6.64a5.67 5.67 0 01-2.44 3.73l4.12 2.3C22.48 17.77 23.84 15.08 23.84 12z"/></svg>Google</button>
      <button class="s-btn" onclick="appleLogin()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>Apple</button>
    </div>
    <div class="div-or">or email</div>
    <div class="fg"><label>Email</label><input type="email" id="lEmail" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fg"><label>Password</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-sub" id="loginBtn" onclick="doLogin()">Enter</button>
    <div class="m-sw">New here? <a onclick="switchModal('loginModal','registerModal')">Create account</a></div>
  </div>
</div>

<div class="ov" id="registerModal">
  <div class="modal">
    <button class="mx" onclick="closeModal('registerModal')">✕</button>
    <h2 class="m-title">Join us</h2>
    <p class="m-sub">Create account</p>
    <div class="soc-row">
      <button class="s-btn" onclick="googleLogin()"><svg viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.2 7.2 0 0112 4.8c1.73 0 3.28.62 4.49 1.64l3.36-3.36A11.94 11.94 0 0012 .84C7.33.84 3.28 3.67 1.32 7.72l3.94 2.05z"/><path fill="#34A853" d="M16.21 18.63A7.17 7.17 0 0112 20.2a7.2 7.2 0 01-6.74-4.7l-3.95 2A11.95 11.95 0 0012 24c3.2 0 6.11-1.16 8.33-3.07l-4.12-2.3z"/><path fill="#FBBC05" d="M19.14 5.08l-3.36 3.36A7.15 7.15 0 0119.2 12c0 .88-.16 1.72-.44 2.5l4.08 2.28A11.9 11.9 0 0024 12c0-2.63-.84-5.07-2.26-7.07l-2.6.15z"/><path fill="#4285F4" d="M23.84 12c0-.75-.07-1.48-.2-2.19H12v4.14h6.64a5.67 5.67 0 01-2.44 3.73l4.12 2.3C22.48 17.77 23.84 15.08 23.84 12z"/></svg>Google</button>
