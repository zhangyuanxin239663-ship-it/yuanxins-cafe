<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuanxin's Café</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0D0C0B;--border:rgba(255,255,255,0.08);--text:#E8E2DA;--muted:#6A6259;
  --accent:#C8A97E;--danger:#B05040;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:22px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,12,11,.92);backdrop-filter:blur(14px);}
.logo{font-family:'EB Garamond',serif;font-style:italic;font-size:16px;letter-spacing:2px;color:var(--text);background:none;border:none;cursor:pointer;}
.btn-o,.btn-s{font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:2px;cursor:pointer;}
.btn-o{border:1px solid var(--border);color:var(--muted);background:transparent;}
.btn-o:hover{border-color:rgba(255,255,255,.18);color:var(--text);}
.btn-s{background:var(--accent);color:#0D0C0B;border:none;}
.btn-s:hover{opacity:.85;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(rgba(13,12,11,.6), rgba(13,12,11,.9)), url('bg.jpg');background-size:cover;}
.h-name{font-family:'EB Garamond',serif;font-size:clamp(56px,12vw,120px);color:#fff;}
.h-name em{color:var(--accent);font-style:italic;}
.h-div{width:28px;height:1px;background:var(--accent);margin:28px auto;}
.enter-btn{font-family:'EB Garamond',serif;font-size:18px;color:rgba(232,226,218,.75);background:none;border:none;cursor:pointer;}
.enter-btn:hover{color:var(--accent);}
.fp-wrap{max-width:680px;margin:0 auto;padding:100px 24px;}
.fp-head{display:flex;justify-content:space-between;margin-bottom:40px;border-bottom:1px solid var(--border);padding-bottom:20px;}
.fp-title{font-family:'EB Garamond',serif;font-size:36px;}
.fp-title span{color:var(--accent);font-style:italic;}
.fp-count{font-size:11px;color:var(--muted);}
.compose{border:1px solid var(--border);padding:22px;margin-bottom:40px;}
.c-top{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3A2010,var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
.c-who{font-size:12px;color:var(--muted);}
.c-ta{width:100%;min-height:88px;font-family:'EB Garamond',serif;font-size:18px;background:transparent;border:none;color:var(--text);resize:none;outline:none;}
.c-ta::placeholder{color:rgba(232,226,218,.18);}
.c-ft{display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.c-cnt{font-size:11px;color:var(--muted);}
.btn-pub{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;background:var(--accent);color:#0D0C0B;border:none;border-radius:2px;cursor:pointer;}
.btn-pub:disabled{background:rgba(200,169,126,.18);}
.post{padding:28px 0;border-bottom:1px solid var(--border);}
.p-hd{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.p-meta{flex:1;}
.p-auth{font-family:'EB Garamond',serif;font-size:16px;color:var(--text);background:none;border:none;cursor:pointer;}
.p-time{font-size:10px;color:var(--muted);margin-top:1px;}
.p-body{font-family:'EB Garamond',serif;font-size:19px;line-height:1.8;margin-bottom:14px;}
.p-acts{display:flex;gap:18px;}
.pa{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;}
.pa:hover{color:var(--accent);}
.cmts-wrap{margin-top:14px;max-height:0;overflow:hidden;transition:max-height .3s;}
.cmts-wrap.open{max-height:500px;}
.cmts-inner{padding-left:18px;border-left:1px solid rgba(200,169,126,.15);}
.cmt{padding:9px 0;border-bottom:1px solid var(--border);}
.cmt:last-child{border:none;}
.cmt-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.cmt-auth{font-size:12px;color:var(--accent);}
.cmt-time{font-size:10px;color:var(--muted);margin-left:auto;}
.cmt-body{font-family:'EB Garamond',serif;font-size:16px;}
.cmt-form{display:flex;gap:8px;margin-top:14px;}
.cmt-in{flex:1;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);outline:none;}
.btn-cmt{padding:9px 14px;background:transparent;border:1px solid var(--border);color:var(--accent);cursor:pointer;}
.nr{text-align:center;padding:48px;color:var(--muted);font-style:italic;}
.loading-msg{text-align:center;padding:48px;color:var(--muted);}
.spin{display:inline-block;width:13px;height:13px;border:1.5px solid rgba(232,226,218,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:7px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ov{display:none;position:fixed;inset:0;background:rgba(5,4,3,.9);align-items:center;justify-content:center;z-index:300;}
.ov.open{display:flex;}
.modal{background:#111009;border:1px solid var(--border);width:100%;max-width:400px;padding:40px;position:relative;}
.mx{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;}
.m-title{font-family:'EB Garamond',serif;font-size:26px;}
.m-sub{font-size:10px;color:var(--muted);margin-bottom:24px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;}
.fg input{width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);outline:none;}
.btn-sub{width:100%;padding:13px;background:var(--accent);color:#0D0C0B;border:none;cursor:pointer;}
.soc-row{display:flex;gap:8px;margin-bottom:4px;}
.s-btn{flex:1;padding:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);cursor:pointer;}
.div-or{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--muted);margin:18px 0;}
.div-or::before,.div-or::after{content:'';flex:1;height:1px;background:var(--border);}
.m-sw{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
.m-sw a{color:var(--accent);cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111009;border:1px solid var(--border);padding:10px 24px;font-size:11px;z-index:400;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<nav id="nav">
  <button class="logo" onclick="showPage('home')">yuanxin's café</button>
  <div class="nav-r" id="navAuth"></div>
</nav>

<div class="page active" id="homePage">
  <section class="hero">
    <div class="hero-inner">
      <h1 class="h-name">Yuanxin's<br><em>Café</em></h1>
      <div class="h-div"></div>
      <button class="enter-btn" onclick="showPage('feelings')">share your feelings →</button>
    </div>
  </section>
</div>

<div class="page" id="feelingsPage">
  <div class="fp-wrap">
    <div class="fp-head">
      <h2 class="fp-title">Share Your <span>Feelings</span></h2>
      <span class="fp-count" id="pCount"></span>
    </div>
    <div id="cArea"></div>
    <div id="pFeed"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase Config
const SURL = 'https://kjgeitgrvljrqblbrcet.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZ2VpdGdydmxqcnFibGJyY2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTUyNDAsImV4cCI6MjA5MDY5MTI0MH0.WcWqqXlNAW0CycEnMNkgkKeAUVqMx-FES0cl_Bjucvw';

let currentUser = null;
let currentProfile = null;
let sessionToken = null;

// Helper functions
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(ts) {
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h = Math.floor(m/60);
  if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Direct REST API call (no Supabase client lock issues!)
// Direct REST API call (no Supabase client lock issues!)
async function restCall(path, options = {}) {
  const headers = {
    'apikey': SKEY,
    'Content-Type': 'application/json'
  };
  if (sessionToken) {
    headers['Authorization'] = 'Bearer ' + sessionToken;
  }
  
  try {
    const res = await fetch(SURL + '/rest/v1/' + path, {
      ...options,
      headers: headers
    });
    
    // Handle empty responses (success with no content)
    if (res.status === 204) {
      return { success: true };
    }
    
    // Get response text
    const text = await res.text();
    
    // If empty response and not a GET request, return success
    if (!text || text.trim() === '') {
      return options.method === 'GET' ? [] : { success: true };
    }
    
    // Parse JSON
    const data = JSON.parse(text);
    
    // Check for errors
    if (!res.ok) {
      throw new Error(data.message || JSON.stringify(data));
    }
    
    return data;
  } catch (err) {
    console.error('REST call error:', err);
    throw err;
  }
}

// Navigation
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + 'Page').classList.add('active');
  if (page === 'feelings') {
    renderCompose();
    loadPosts();
  }
}

// Auth UI
function renderNav() {
  const container = document.getElementById('navAuth');
  if (currentUser && currentProfile) {
    container.innerHTML = `<button class="btn-o" onclick="doLogout()">Logout</button>`;
  } else {
    container.innerHTML = `<button class="btn-o" onclick="openModal('loginModal')">Login</button><button class="btn-s" onclick="openModal('registerModal')">Join</button>`;
  }
}

// Modals
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Initialize Supabase auth (just for login, not for DB queries)
const sb = supabase.createClient(SURL, SKEY);

async function updateSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    sessionToken = session.access_token;
    currentUser = session.user;
    await loadProfile();
  } else {
    sessionToken = null;
    currentUser = null;
    currentProfile = null;
  }
  renderNav();
}

// Load profile using REST
async function loadProfile() {
  if (!currentUser) return;
  try {
    const data = await restCall(`profiles?id=eq.${currentUser.id}&limit=1`);
    if (data && data[0]) {
      currentProfile = data[0];
    } else {
      const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
      const newProfile = await restCall('profiles', {
        method: 'POST',
        body: JSON.stringify({ id: currentUser.id, name, email: currentUser.email })
      });
      currentProfile = newProfile?.[0] || { id: currentUser.id, name };
    }
  } catch (err) {
    console.error('Profile error:', err);
  }
}

// Login/Register
async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass = document.getElementById('lPass').value;
  if (!email || !pass) { toast('Please fill all fields'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { toast(error.message); return; }
  await updateSession();
  closeModal('loginModal');
  toast('Welcome back!');
  if (document.getElementById('feelingsPage').classList.contains('active')) {
    renderCompose();
    loadPosts();
  }
}

async function doRegister() {
  const first = document.getElementById('rFirst').value.trim();
  const last = document.getElementById('rLast').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const pass = document.getElementById('rPass').value;
  if (!first || !email || !pass) { toast('Please fill all fields'); return; }
  if (pass.length < 6) { toast('Password needs 6+ characters'); return; }
  const name = first + (last ? ' ' + last : '');
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { toast(error.message); return; }
  await updateSession();
  closeModal('registerModal');
  toast('Welcome ' + first + '!');
}

async function googleLogin() {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
  if (error) toast(error.message);
}

async function doLogout() {
  await sb.auth.signOut();
  sessionToken = null;
  currentUser = null;
  currentProfile = null;
  renderNav();
  showPage('home');
  toast('See you soon');
}

// Compose box
function renderCompose() {
  const area = document.getElementById('cArea');
  if (!currentUser) {
    area.innerHTML = `<div style="text-align:center;padding:40px;border:1px dashed var(--border);"><p>Sign in to share your feelings.</p><button class="btn-pub" onclick="openModal('loginModal')">Join the conversation</button></div>`;
    return;
  }
  if (!currentProfile) {
    area.innerHTML = `<div class="loading-msg"><span class="spin"></span>Loading...</div>`;
    setTimeout(renderCompose, 500);
    return;
  }
  area.innerHTML = `<div class="compose"><div class="c-top"><div class="av">${(currentProfile.name || '?')[0]}</div><span class="c-who">${esc(currentProfile.name || 'You')}</span></div><textarea class="c-ta" id="cTA" maxlength="1000" placeholder="What are you feeling today…" oninput="updateCharCount()"></textarea><div class="c-ft"><span class="c-cnt" id="cCnt">0 / 1000</span><button class="btn-pub" id="pubBtn" onclick="publishPost()" disabled>Publish</button></div></div>`;
}

function updateCharCount() {
  const ta = document.getElementById('cTA');
  const btn = document.getElementById('pubBtn');
  const cnt = document.getElementById('cCnt');
  if (!ta) return;
  cnt.textContent = ta.value.length + ' / 1000';
  btn.disabled = ta.value.trim().length === 0;
}
async function publishPost() {
  const ta = document.getElementById('cTA');
  const text = ta.value.trim();
  if (!text || !currentUser || !currentProfile) return;
  
  const btn = document.getElementById('pubBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  
  try {
    await restCall('posts', {
      method: 'POST',
      body: JSON.stringify({
        user_id: currentUser.id,
        author_name: currentProfile.name || 'Anonymous',
        content: text
      })
    });
    
    ta.value = '';
    updateCharCount();
    await loadPosts();
    toast('✨ Shared!');
  } catch (err) {
    console.error('Post error:', err);
    toast('Error posting - please try again');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Publish';
  }
}

// Load posts using REST
async function loadPosts() {
  const feed = document.getElementById('pFeed');
  feed.innerHTML = '<div class="loading-msg"><span class="spin"></span>Loading feelings...</div>';
  
  try {
    const posts = await restCall('posts?order=created_at.desc');
    
    document.getElementById('pCount').textContent = (posts || []).length + ' feelings';
    
    if (!posts || posts.length === 0) {
      feed.innerHTML = '<p class="nr">Nothing yet — be the first to share.</p>';
      return;
    }
    
    feed.innerHTML = posts.map(post => {
      const canDelete = currentUser && currentUser.id === post.user_id;
      return `
        <div class="post" id="post-${post.id}">
          <div class="p-hd">
            <div class="av">${(post.author_name || '?')[0]}</div>
            <div class="p-meta">
              <button class="p-auth">${esc(post.author_name || 'Anonymous')}</button>
              <div class="p-time">${timeAgo(post.created_at)}</div>
            </div>
          </div>
          <div class="p-body">${esc(post.content)}</div>
          <div class="p-acts">
            <button class="pa" onclick="toggleComments('${post.id}')">💬 <span id="cc-${post.id}">0</span> replies</button>
            ${canDelete ? `<button class="pa" onclick="deletePost('${post.id}')" style="color:var(--danger);">Delete</button>` : ''}
          </div>
          <div class="cmts-wrap" id="cmw-${post.id}">
            <div class="cmts-inner" id="cmi-${post.id}">
              <div class="loading-msg" style="padding:20px;"><span class="spin"></span> Loading replies...</div>
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    // Load comments for each post
    for (let post of posts) {
      loadCommentsForPost(post.id);
    }
  } catch (err) {
    console.error('Load posts error:', err);
    feed.innerHTML = '<p class="nr">Could not load posts. <button onclick="loadPosts()" style="background:var(--accent);color:#0D0C0B;border:none;padding:8px 16px;border-radius:2px;cursor:pointer;margin-top:16px;">Try Again</button></p>';
  }
}

async function loadCommentsForPost(postId) {
  try {
    const comments = await restCall(`comments?post_id=eq.${postId}&order=created_at.asc`);
    
    const commentCount = document.getElementById(`cc-${postId}`);
    if (commentCount) commentCount.textContent = comments?.length || 0;
    
    const inner = document.getElementById(`cmi-${postId}`);
    if (!inner) return;
    
    if (!comments || comments.length === 0) {
      inner.innerHTML = `<p class="no-cmt">No replies yet...</p>
        ${currentUser ? `<div class="cmt-form"><input class="cmt-in" type="text" id="ci-${postId}" placeholder="Reply..." onkeypress="if(event.key==='Enter')addComment('${postId}')"><button class="btn-cmt" onclick="addComment('${postId}')">Send</button></div>` : '<p class="sign-cmt"><a onclick="openModal(\'loginModal\')">Sign in</a> to reply</p>'}`;
      return;
    }
    
    const list = comments.map(c => `
      <div class="cmt">
        <div class="cmt-hd">
          <span class="cmt-auth">${esc(c.author_name)}</span>
          <span class="cmt-time">${timeAgo(c.created_at)}</span>
        </div>
        <div class="cmt-body">${esc(c.text)}</div>
      </div>
    `).join('');
    
    inner.innerHTML = list + (currentUser ? `<div class="cmt-form"><input class="cmt-in" type="text" id="ci-${postId}" placeholder="Reply..." onkeypress="if(event.key==='Enter')addComment('${postId}')"><button class="btn-cmt" onclick="addComment('${postId}')">Send</button></div>` : '<p class="sign-cmt"><a onclick="openModal(\'loginModal\')">Sign in</a> to reply</p>');
  } catch (err) {
    console.error('Error loading comments:', err);
  }
}

function toggleComments(postId) {
  const el = document.getElementById('cmw-' + postId);
  el.classList.toggle('open');
}

async function addComment(postId) {
  if (!currentUser) { openModal('loginModal'); return; }
  const input = document.getElementById('ci-' + postId);
  const text = input.value.trim();
  if (!text) return;
  
  input.disabled = true;
  
  try {
    await restCall('comments', {
      method: 'POST',
      body: JSON.stringify({
        post_id: postId,
        user_id: currentUser.id,
        author_name: currentProfile?.name || 'Anonymous',
        text: text
      })
    });
    
    input.value = '';
    await loadCommentsForPost(postId);
    
    const comments = await restCall(`comments?post_id=eq.${postId}`);
    const commentCount = document.getElementById(`cc-${postId}`);
    if (commentCount) commentCount.textContent = comments?.length || 0;
    
    toast('Replied');
  } catch (err) {
    toast('Could not post reply');
  } finally {
    input.disabled = false;
  }
}

async function deletePost(postId) {
  if (!confirm('Delete this feeling?')) return;
  
  try {
    await restCall(`posts?id=eq.${postId}&user_id=eq.${currentUser.id}`, { method: 'DELETE' });
    await loadPosts();
    toast('Deleted');
  } catch (err) {
    toast('Could not delete');
  }
}

// Auth state listener
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    sessionToken = session.access_token;
    currentUser = session.user;
    await loadProfile();
  } else {
    sessionToken = null;
    currentUser = null;
    currentProfile = null;
  }
  renderNav();
  if (document.getElementById('feelingsPage').classList.contains('active')) {
    renderCompose();
    loadPosts();
  }
});

// Initialize
(async () => {
  await updateSession();
  renderNav();
})();
</script>

<!-- Login Modal -->
<div class="ov" id="loginModal">
  <div class="modal">
    <button class="mx" onclick="closeModal('loginModal')">✕</button>
    <h2 class="m-title">Welcome back</h2>
    <p class="m-sub">Sign in</p>
    <div class="soc-row">
      <button class="s-btn" onclick="googleLogin()">Google</button>
    </div>
    <div class="div-or">or email</div>
    <div class="fg"><label>Email</label><input type="email" id="lEmail"></div>
    <div class="fg"><label>Password</label><input type="password" id="lPass"></div>
    <button class="btn-sub" onclick="doLogin()">Enter</button>
    <div class="m-sw">New here? <a onclick="closeModal('loginModal');openModal('registerModal')">Create account</a></div>
  </div>
</div>

<div class="ov" id="registerModal">
  <div class="modal">
    <button class="mx" onclick="closeModal('registerModal')">✕</button>
    <h2 class="m-title">Join us</h2>
    <p class="m-sub">Create account</p>
    <div class="fgr">
      <div class="fg"><label>First Name</label><input type="text" id="rFirst"></div>
      <div class="fg"><label>Last Name</label><input type="text" id="rLast"></div>
    </div>
    <div class="fg"><label>Email</label><input type="email" id="rEmail"></div>
    <div class="fg"><label>Password</label><input type="password" id="rPass"></div>
    <button class="btn-sub" onclick="doRegister()">Create Account</button>
