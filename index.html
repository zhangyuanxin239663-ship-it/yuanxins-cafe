<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>yuanxin's café · drifting notes</title>
  <!-- Fonts: pure elegance + modern weight -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* avoid accidental text selection while dragging */
    }

    body {
      background-color: #0a0908;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      height: 100vh;
    }

    /* --- CLOUD PARALLAX: zoom & move on cursor --- */
    .cloud-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.88) contrast(1.05);
      transition: transform 0.08s ease-out;
      will-change: transform;
      z-index: -2;
      transform-origin: center center;
    }

    .dark-veil {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, rgba(10,9,8,0.2) 0%, rgba(10,9,8,0.65) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* pages */
    .page {
      display: none;
      width: 100%;
      min-height: 100vh;
      position: relative;
    }
    .page.active {
      display: block;
    }

    /* ========== HOME: ONLY ONE ROW, MASSIVE, FULL SCREEN ========== */
    .hero-home {
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .monumental {
      font-family: 'Playfair Display', serif;
      font-size: clamp(88px, 14vw, 210px);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.02;
      background: linear-gradient(135deg, #fef3df 0%, #e9d5aa 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
      transition: transform 0.2s ease;
    }
    .monumental:hover {
      transform: scale(1.01);
    }

    /* ========== SUBPAGE: ORGANIC STICKY WALL (draggable notes) ========== */
    .wall-container {
      position: relative;
      min-height: 100vh;
      width: 100%;
      padding: 40px 40px 120px 40px;
      background: transparent;
    }

    /* each note is absolutely positioned → random arrangement */
    .sticky-note {
      position: absolute;
      min-width: 240px;
      max-width: 340px;
      background: #fffef7;
      border-radius: 28px;
      padding: 0;
      box-shadow: 0 18px 28px -12px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s, transform 0.05s linear;
      cursor: grab;
      z-index: 10;
      backdrop-filter: blur(1px);
      will-change: left, top;
    }
    .sticky-note:active {
      cursor: grabbing;
      box-shadow: 0 24px 38px -14px rgba(0,0,0,0.5);
      z-index: 999;
    }

    /* paper color variants (10+ colors) */
    .note-cream { background: #fffef5; }
    .note-ivory { background: #fef7e8; }
    .note-mint { background: #f2f9f2; }
    .note-lavender { background: #f8f3fc; }
    .note-peach { background: #fff2e6; }
    .note-sky { background: #eef5ff; }
    .note-rose { background: #fff0f2; }
    .note-butter { background: #fff8e0; }
    .note-seafoam { background: #e9f4ef; }
    .note-terracotta { background: #fceaea; }
    .note-mauve { background: #f5ecf0; }
    .note-citrus { background: #fff7e0; }

    .pin-icon {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, #e0b57a, #b87c4f);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      z-index: 12;
      border: 1px solid rgba(255,210,130,0.7);
      pointer-events: none;
    }

    .note-inner {
      padding: 28px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .note-text {
      font-size: 17px;
      line-height: 1.45;
      word-break: break-word;
      font-family: var(--note-font, 'Inter');
      font-weight: 400;
      color: #1f1e1a;
    }
    .note-text.serif { font-family: 'Playfair Display', serif; font-weight: 450; }
    .note-text.sans { font-family: 'Inter', sans-serif; font-weight: 400; }
    .note-text.modern { font-family: 'Playfair Display', serif; font-weight: 500; letter-spacing: -0.2px; }
    .note-text.wavy { font-family: 'Inter', sans-serif; font-style: italic; }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 12px;
      font-size: 10px;
      letter-spacing: 0.3px;
      color: #5f5b4e;
      text-transform: uppercase;
    }
    .note-author {
      font-weight: 700;
      color: #b48c48;
      background: none;
      border: none;
      font-size: 10px;
      cursor: pointer;
    }
    .delete-note {
      background: none;
      border: none;
      font-size: 11px;
      color: #aa7a5c;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 40px;
    }
    .delete-note:hover { background: #f2e3d4; color: #bc5a3c; }

    /* ---- THE "+" NOTE (always present, looks like a sticky, triggers login or compose) ---- */
    .add-note {
      position: absolute;
      background: #e6ddcd;
      box-shadow: 0 18px 28px -12px rgba(0,0,0,0.3);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .add-note:hover {
      transform: scale(1.02);
      background: #f5ecd9;
    }
    .add-plus {
      font-size: 48px;
      font-weight: 300;
      color: #6a5a44;
    }

    /* small drawer (login / profile) */
    .user-drawer {
      position: fixed;
      bottom: 28px;
      left: 28px;
      background: #1e1b16ee;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200,170,110,0.5);
      border-radius: 36px;
      padding: 18px 22px;
      width: 270px;
      z-index: 200;
      display: none;
      flex-direction: column;
      gap: 12px;
      font-family: 'Inter', sans-serif;
    }
    .user-drawer.open { display: flex; }
    .drawer-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 500;
    }
    .edit-btn, .logout-action {
      background: rgba(200,170,110,0.2);
      border: none;
      padding: 8px;
      border-radius: 40px;
      color: #e2cfaa;
      cursor: pointer;
      font-size: 12px;
    }
    .login-input {
      background: #2b2822;
      border: none;
      padding: 10px;
      border-radius: 40px;
      color: #ece8e0;
      margin-bottom: 6px;
    }
    .login-small-btn {
      background: #c8aa6e;
      border: none;
      padding: 8px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
    .toast-msg {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f1c17;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: 0.1s;
      color: #e2cfaa;
    }
    @media (max-width: 680px) {
      .wall-container { padding: 30px 20px 100px 20px; }
      .sticky-note { min-width: 200px; }
      .user-drawer { left: 16px; bottom: 16px; width: 240px; padding: 14px; }
    }
  </style>
</head>
<body>

<div class="cloud-bg" id="cloudBg"></div>
<div class="dark-veil"></div>

<!-- HOME PAGE : ONLY "yuanxin's café" massive, single row -->
<div class="page active" id="homePage">
  <div class="hero-home" id="homeTrigger">
    <div class="monumental">yuanxin’s café</div>
  </div>
</div>

<!-- SUB PAGE : wall of draggable notes -->
<div class="page" id="feelingsPage">
  <div class="wall-container" id="wallContainer"></div>
</div>

<!-- floating drawer (login/profile) -->
<div class="user-drawer" id="userDrawer">
  <div id="drawerDynamic"></div>
</div>

<div class="toast-msg" id="liveToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ----------------------------- SUPABASE SETUP ---------------------------------
  const SURL = 'https://kjgeitgrvljrqblbrcet.supabase.co';
  const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZ2VpdGdydmxqcnFibGJyY2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTUyNDAsImV4cCI6MjA5MDY5MTI0MH0.WcWqqXlNAW0CycEnMNkgkKeAUVqMx-FES0cl_Bjucvw';
  const sb = supabase.createClient(SURL, SKEY);

  let currentUser = null;
  let currentProfile = null;
  let sessionToken = null;

  // helper ui
  function toastMsg(msg) {
    const t = document.getElementById('liveToast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2200);
  }

  // ----- REST (bypass lock issues) -----
  async function restCall(path, options = {}) {
    const headers = { 'apikey': SKEY, 'Content-Type': 'application/json' };
    if (sessionToken) headers['Authorization'] = 'Bearer ' + sessionToken;
    const res = await fetch(SURL + '/rest/v1/' + path, { ...options, headers });
    if (res.status === 204) return { success: true };
    const text = await res.text();
    if (!text || text.trim() === '') return options.method === 'GET' ? [] : { success: true };
    const data = JSON.parse(text);
    if (!res.ok) throw new Error(data.message || 'api error');
    return data;
  }

  async function updateSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      sessionToken = session.access_token;
      currentUser = session.user;
      await loadProfile();
    } else {
      sessionToken = null; currentUser = null; currentProfile = null;
    }
    renderDrawer();
  }

  async function loadProfile() {
    if (!currentUser) return;
    try {
      const data = await restCall(`profiles?id=eq.${currentUser.id}&limit=1`);
      if (data && data[0]) currentProfile = data[0];
      else {
        const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
        await restCall('profiles', { method: 'POST', body: JSON.stringify({ id: currentUser.id, name, email: currentUser.email }) });
        currentProfile = { id: currentUser.id, name };
      }
    } catch(e) { console.warn(e); }
  }

  // ---------- DRAWER : LOGIN / PROFILE (simple, no avatar) ----------
  function renderDrawer() {
    const container = document.getElementById('drawerDynamic');
    if (!container) return;
    if (currentUser && currentProfile) {
      container.innerHTML = `
        <div class="drawer-name">☕ ${escapeHtml(currentProfile.name || 'guest')}</div>
        <button class="edit-btn" id="editProfileBtn">edit name</button>
        <button class="logout-action" id="logoutBtn">log out</button>
      `;
      document.getElementById('editProfileBtn')?.addEventListener('click', async () => {
        const newName = prompt('edit your display name', currentProfile.name);
        if (newName && newName.trim() && currentUser) {
          await restCall(`profiles?id=eq.${currentUser.id}`, { method: 'PATCH', body: JSON.stringify({ name: newName.trim() }) });
          await loadProfile();
          renderDrawer();
          toastMsg('name updated');
          if (document.getElementById('feelingsPage').classList.contains('active')) loadAllNotes();
        }
      });
      document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        sessionToken = null; currentUser = null; currentProfile = null;
        renderDrawer();
        document.getElementById('userDrawer').classList.remove('open');
        if (document.getElementById('feelingsPage').classList.contains('active')) loadAllNotes();
        toastMsg('logged out');
      });
    } else {
      container.innerHTML = `
        <input class="login-input" type="email" id="drawerEmail" placeholder="email">
        <input class="login-input" type="password" id="drawerPass" placeholder="password">
        <button class="login-small-btn" id="drawerLoginBtn">log in</button>
        <div style="text-align:center; font-size:11px; margin:4px 0;">or</div>
        <button class="login-small-btn" id="drawerGoogleBtn">continue with google</button>
        <button class="edit-btn" id="drawerRegisterBtn">create account</button>
      `;
      document.getElementById('drawerLoginBtn')?.addEventListener('click', drawerLogin);
      document.getElementById('drawerGoogleBtn')?.addEventListener('click', () => googleLogin());
      document.getElementById('drawerRegisterBtn')?.addEventListener('click', openRegisterModal);
    }
  }

  async function drawerLogin() {
    const email = document.getElementById('drawerEmail')?.value.trim();
    const pass = document.getElementById('drawerPass')?.value;
    if (!email || !pass) { toastMsg('enter email/password'); return; }
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { toastMsg(error.message); return; }
    await updateSession();
    renderDrawer();
    if (document.getElementById('feelingsPage').classList.contains('active')) loadAllNotes();
    toastMsg(`welcome, ${currentProfile?.name || ''}`);
  }

  async function googleLogin() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
    if (error) toastMsg(error.message);
  }

  function openRegisterModal() {
    const first = prompt('first name');
    if (!first) return;
    const last = prompt('last name (optional)') || '';
    const email = prompt('email');
    if (!email) return;
    const pass = prompt('password (min 6 characters)');
    if (!pass || pass.length < 6) { toastMsg('password too short'); return; }
    const fullName = first + (last ? ' ' + last : '');
    sb.auth.signUp({ email, password: pass, options: { data: { full_name: fullName } } })
      .then(({ error }) => { if(error) toastMsg(error.message); else toastMsg('account created! please log in'); });
  }

  // ----- STICKY NOTES : draggable + random placement + wall -----
  let notesArray = [];     // store DOM ids + data
  let dragActive = false;
  let currentDragElement = null;
  let dragStartX = 0, dragStartY = 0;
  let initialLeft = 0, initialTop = 0;

  function makeDraggable(el) {
    el.addEventListener('mousedown', (e) => {
      if (e.target.closest('.delete-note')) return;
      e.preventDefault();
      dragActive = true;
      currentDragElement = el;
      const rect = el.getBoundingClientRect();
      const containerRect = document.getElementById('wallContainer').getBoundingClientRect();
      initialLeft = rect.left - containerRect.left;
      initialTop = rect.top - containerRect.top;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      el.style.cursor = 'grabbing';
      el.style.zIndex = '1000';
    });
  }

  window.addEventListener('mousemove', (e) => {
    if (!dragActive || !currentDragElement) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    let newLeft = initialLeft + dx;
    let newTop = initialTop + dy;
    const container = document.getElementById('wallContainer');
    const maxLeft = container.clientWidth - currentDragElement.offsetWidth;
    const maxTop = container.clientHeight - currentDragElement.offsetHeight;
    newLeft = Math.min(Math.max(0, newLeft), maxLeft);
    newTop = Math.min(Math.max(0, newTop), maxTop);
    currentDragElement.style.left = newLeft + 'px';
    currentDragElement.style.top = newTop + 'px';
    currentDragElement.style.position = 'absolute';
  });

  window.addEventListener('mouseup', () => {
    if (dragActive && currentDragElement) {
      currentDragElement.style.cursor = 'grab';
      currentDragElement.style.zIndex = '';
      dragActive = false;
      currentDragElement = null;
    }
  });

  // generate random positions inside wallContainer
  function randomPosition(element, index) {
    const container = document.getElementById('wallContainer');
    if (!container) return { left: 20, top: 20 };
    const maxW = Math.max(container.clientWidth - element.offsetWidth, 120);
    const maxH = Math.max(container.clientHeight - element.offsetHeight, 280);
    // use deterministic offset + perlin chaos
    const seed = (index * 131) % 1000;
    const left = (seed * 17) % maxW;
    const top = ((seed * 43) % maxH) + 30;
    return { left: Math.min(maxW-20, left), top: Math.min(maxH-40, top) };
  }

  async function loadAllNotes() {
    const container = document.getElementById('wallContainer');
    if (!container) return;
    container.innerHTML = ''; // clear
    try {
      const posts = await restCall('posts?order=created_at.desc');
      const notes = posts || [];
      // create each sticky note
      notes.forEach((note, idx) => {
        const canDelete = currentUser && currentUser.id === note.user_id;
        const colorClass = note.card_color || 'cream';
        const fontClass = note.font_style || 'serif';
        const noteDiv = document.createElement('div');
        noteDiv.className = `sticky-note note-${colorClass}`;
        noteDiv.setAttribute('data-id', note.id);
        noteDiv.innerHTML = `
          <div class="pin-icon"></div>
          <div class="note-inner">
            <div class="note-text ${fontClass}">${escapeHtml(note.content)}</div>
            <div class="note-footer">
              <button class="note-author" data-author="${note.user_id}">${escapeHtml(note.author_name || 'anonymous')}</button>
              <span>${timeAgo(note.created_at)}</span>
              ${canDelete ? `<button class="delete-note" data-del="${note.id}">✕</button>` : ''}
            </div>
          </div>
        `;
        container.appendChild(noteDiv);
        const pos = randomPosition(noteDiv, idx);
        noteDiv.style.position = 'absolute';
        noteDiv.style.left = pos.left + 'px';
        noteDiv.style.top = pos.top + 'px';
        noteDiv.style.cursor = 'grab';
        makeDraggable(noteDiv);
        // delete event
        noteDiv.querySelector('.delete-note')?.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!currentUser) { toastMsg('log in to delete'); return; }
          if (confirm('remove this note?')) {
            await restCall(`posts?id=eq.${note.id}&user_id=eq.${currentUser.id}`, { method: 'DELETE' });
            loadAllNotes();
            toastMsg('note removed');
          }
        });
        noteDiv.querySelector('.note-author')?.addEventListener('click', () => {
          toastMsg(`✧ by ${escapeHtml(note.author_name || 'anonymous')}`);
        });
      });
      // ---- THE "+" NOTE (inside the wall, like a sticky note) ----
      const addSticky = document.createElement('div');
      addSticky.className = 'sticky-note add-note';
      addSticky.style.background = '#f9f2e2';
      addSticky.style.display = 'flex';
      addSticky.style.alignItems = 'center';
      addSticky.style.justifyContent = 'center';
      addSticky.style.minWidth = '140px';
      addSticky.style.maxWidth = '160px';
      addSticky.style.height = '140px';
      addSticky.innerHTML = `<div class="pin-icon"></div><div class="add-plus" style="font-size:58px;">+</div>`;
      container.appendChild(addSticky);
      const addPos = randomPosition(addSticky, notes.length + 777);
      addSticky.style.position = 'absolute';
      addSticky.style.left = addPos.left + 'px';
      addSticky.style.top = addPos.top + 'px';
      addSticky.style.cursor = 'pointer';
      makeDraggable(addSticky);
      addSticky.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) {
          document.getElementById('userDrawer').classList.toggle('open');
          return;
        }
        // open compose modal (inline mini modal)
        openComposeModal();
      });
    } catch(err) {
      console.warn(err);
      container.innerHTML = '<div style="padding:60px; text-align:center;">could not load notes, refresh</div>';
    }
  }

  // simple compose modal with 12 colors + fonts
  let selectedColor = 'cream';
  let selectedFont = 'serif';
  function openComposeModal() {
    const colors = ['cream','ivory','mint','lavender','peach','sky','rose','butter','seafoam','terracotta','mauve','citrus'];
    const colorHtml = colors.map(c => `<div class="color-chip ${c}" data-col="${c}" style="width:38px;height:38px;border-radius:50%;background:var(--bgc); margin:4px; display:inline-block; cursor:pointer;" data-color="${c}"></div>`).join('');
    const modalDiv = document.createElement('div');
    modalDiv.style.position = 'fixed';
    modalDiv.style.top = '0';
    modalDiv.style.left = '0';
    modalDiv.style.width = '100%';
    modalDiv.style.height = '100%';
    modalDiv.style.background = 'rgba(0,0,0,0.75)';
    modalDiv.style.backdropFilter = 'blur(12px)';
    modalDiv.style.zIndex = '2000';
    modalDiv.style.display = 'flex';
    modalDiv.style.alignItems = 'center';
    modalDiv.style.justifyContent = 'center';
    modalDiv.innerHTML = `
      <div style="background:#1e1b16; max-width:500px; width:90%; border-radius:48px; padding:28px; border:1px solid #c8aa6e;">
        <h3 style="font-family:'Playfair Display'; margin-bottom:16px;">✧ pin a new note ✧</h3>
        <textarea id="composeText" rows="3" placeholder="what's floating in your mind..." style="width:100%; background:#2b2822; border:none; padding:14px; border-radius:24px; color:#f2ede4;"></textarea>
        <div style="margin:16px 0 8px;">paper colors</div>
        <div id="colorGrid" style="display:flex; flex-wrap:wrap; gap:8px;">${colorHtml}</div>
        <div style="margin:14px 0 8px;">font style</div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <span data-fnt="serif" class="font-opt" style="background:#2b2822; padding:6px 14px; border-radius:40px;">Serif</span>
          <span data-fnt="sans" class="font-opt" style="background:#2b2822; padding:6px 14px; border-radius:40px;">Sans</span>
          <span data-fnt="modern" class="font-opt" style="background:#2b2822; padding:6px 14px; border-radius:40px;">Modern</span>
          <span data-fnt="wavy" class="font-opt" style="background:#2b2822; padding:6px 14px; border-radius:40px;">Italic</span>
        </div>
        <button id="confirmPublish" style="width:100%; margin-top:24px; background:#c8aa6e; border:none; padding:14px; border-radius:44px; font-weight:bold;">✧ pin to wall ✧</button>
        <button id="closeModalBtn" style="margin-top:12px; background:transparent; border:none; color:#b9aa8c; width:100%; cursor:pointer;">cancel</button>
      </div>
    `;
    document.body.appendChild(modalDiv);
    // set default active color
    document.querySelectorAll('.color-chip').forEach(ch => {
      ch.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue(`--${ch.dataset.col}`) || '#fff';
      ch.addEventListener('click', () => { selectedColor = ch.dataset.color; });
    });
    document.querySelectorAll('.font-opt').forEach(f => {
      f.addEventListener('click', () => { selectedFont = f.dataset.fnt; });
    });
    document.getElementById('confirmPublish').onclick = async () => {
      const text = document.getElementById('composeText').value.trim();
      if (!text) { toastMsg('write something'); return; }
      if (!currentUser) { toastMsg('please log in first'); modalDiv.remove(); return; }
      const btn = document.getElementById('confirmPublish');
      btn.innerText = 'pinning...';
      try {
        await restCall('posts', {
          method: 'POST',
          body: JSON.stringify({
            user_id: currentUser.id,
            author_name: currentProfile?.name || 'visitor',
            content: text,
            card_color: selectedColor,
            font_style: selectedFont
          })
        });
        modalDiv.remove();
        loadAllNotes();
        toastMsg('new note pinned ✦');
      } catch(e) { toastMsg('error'); btn.innerText = '✧ pin to wall ✧'; }
    };
    document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
    document.querySelectorAll('.color-chip')[0]?.click(); // default cream
  }

  // helpers
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function timeAgo(ts) {
    const d = Date.now() - new Date(ts).getTime();
    const m = Math.floor(d/60000);
    if(m<1) return 'just now';
    if(m<60) return m+'m ago';
    const h = Math.floor(m/60);
    if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }

  // ---- background cloud zoom & move (intense parallax) ----
  const cloud = document.getElementById('cloudBg');
  document.addEventListener('mousemove', (e) => {
    const xPercent = (e.clientX / window.innerWidth - 0.5) * 2.2;   // range -1.1 .. 1.1
    const yPercent = (e.clientY / window.innerHeight - 0.5) * 1.5;
    const scale = 1 + Math.abs(xPercent) * 0.12 + Math.abs(yPercent) * 0.08; // zoom max ~1.2
    cloud.style.transform = `translate(${xPercent * 28}px, ${yPercent * 18}px) scale(${scale})`;
  });

  // page navigation
  document.getElementById('homeTrigger')?.addEventListener('click', () => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('feelingsPage').classList.add('active');
    loadAllNotes();
  });

  // init session & auth listener
  sb.auth.onAuthStateChange(async () => { await updateSession(); if (document.getElementById('feelingsPage').classList.contains('active')) loadAllNotes(); });
  (async () => { await updateSession(); })();
</script>
</body>
</html>
