<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>yuanxin's café · pinboard</title>
  <!-- Fonts: elegant serif + clean sans -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0908;
      font-family: 'Inter', sans-serif;
      color: #ece8e0;
      overflow-x: hidden;
    }

    /* --- parallax background (gentle movement) --- */
    .parallax-bg {
      position: fixed;
      top: -5%;
      left: -5%;
      width: 110%;
      height: 110%;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.82) contrast(1.08);
      transition: transform 0.12s ease-out;
      will-change: transform;
      z-index: -2;
    }

    .overlay-dark {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(10,9,8,0.3) 0%, rgba(10,9,8,0.75) 100%);
      z-index: -1;
    }

    /* --- minimal nav (no login buttons) --- */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 36px;
      display: flex;
      justify-content: flex-end;
      z-index: 50;
      backdrop-filter: blur(6px);
      background: rgba(10,9,8,0.2);
      pointer-events: none;
    }
    .nav-placeholder {
      pointer-events: none;
    }

    /* --- pages --- */
    .page {
      display: none;
      min-height: 100vh;
      width: 100%;
    }
    .page.active {
      display: block;
    }

    /* --- HOME: monumental typography + click --- */
    .hero {
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 28vh;
      cursor: pointer;
    }
    .monumental-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(68px, 12vw, 170px);
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.08;
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: linear-gradient(135deg, #f3e9d2 0%, #e2cfaa 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .monumental-title:hover {
      transform: scale(1.02);
    }

    /* --- POSTCARD WALL (no heading, just + button) --- */
    .wall-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 130px 40px 100px 40px;
    }
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 36px;
      margin-top: 20px;
    }

    /* individual postcard */
    .postcard {
      background: #fffef7;
      border-radius: 24px;
      padding: 0;
      transition: all 0.25s ease;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.35);
      position: relative;
      transform: rotate(var(--rot, 0deg));
      display: flex;
      flex-direction: column;
    }
    .postcard:hover {
      transform: translateY(-6px) rotate(0deg);
      box-shadow: 0 28px 40px -16px rgba(0,0,0,0.5);
    }
    /* color variants (12 colors) */
    .postcard.cream { background: #fffef5; }
    .postcard.ivory { background: #fef7e8; }
    .postcard.mint { background: #f2f9f2; }
    .postcard.lavender { background: #f8f3fc; }
    .postcard.peach { background: #fff2e6; }
    .postcard.sky { background: #eef5ff; }
    .postcard.rose { background: #fff0f2; }
    .postcard.butter { background: #fff8e0; }
    .postcard.seafoam { background: #e9f4ef; }
    .postcard.terracotta { background: #fceaea; }
    .postcard.mauve { background: #f5ecf0; }
    .postcard.citrus { background: #fff7e0; }

    .pin {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 28px;
      background: radial-gradient(circle, #e0b57a, #b87c4f);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 3;
      border: 1px solid rgba(255,215,150,0.6);
    }
    .card-inner {
      padding: 28px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .post-content {
      font-size: 17px;
      line-height: 1.45;
      word-break: break-word;
      font-family: var(--post-font, 'Inter');
      font-weight: 400;
      color: #1f1e1a;
    }
    /* font styles */
    .post-content.serif { font-family: 'Playfair Display', serif; font-weight: 450; }
    .post-content.sans { font-family: 'Inter', sans-serif; font-weight: 400; }
    .post-content.modern { font-family: 'Playfair Display', serif; font-weight: 500; }
    .post-content.wavy { font-family: 'Inter', sans-serif; font-style: italic; }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin-top: 8px;
      padding-top: 14px;
      font-size: 11px;
      letter-spacing: 0.3px;
      color: #5f5b4e;
      text-transform: uppercase;
    }
    .author-name {
      font-weight: 700;
      color: #b48c48;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 11px;
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #aa7a5c;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 50px;
    }
    .delete-btn:hover { background: #f2e3d4; color: #bc5a3c; }

    /* floating + button (always visible, triggers login if needed) */
    .floating-add {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 68px;
      height: 68px;
      background: #c8aa6e;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.3);
      transition: all 0.2s;
      z-index: 90;
      font-size: 38px;
      font-weight: 300;
      color: #0a0908;
      border: none;
    }
    .floating-add:hover { transform: scale(1.05); background: #e2bc7c; }

    /* --- MODAL: compose + color palette (10+ colors) --- */
    .modal-card {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5,4,3,0.88);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-card.open { display: flex; }
    .modal-inner {
      background: #1e1b16;
      max-width: 560px;
      width: 90%;
      border-radius: 40px;
      padding: 32px;
      border: 1px solid rgba(200,170,110,0.4);
      box-shadow: 0 30px 40px rgba(0,0,0,0.5);
    }
    .modal-inner h3 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 16px;
    }
    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0 16px;
    }
    .color-chip {
      width: 46px;
      height: 46px;
      border-radius: 60px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.1s;
    }
    .color-chip.cream { background: #fffef5; }
    .color-chip.ivory { background: #fef7e8; }
    .color-chip.mint { background: #f2f9f2; }
    .color-chip.lavender { background: #f8f3fc; }
    .color-chip.peach { background: #fff2e6; }
    .color-chip.sky { background: #eef5ff; }
    .color-chip.rose { background: #fff0f2; }
    .color-chip.butter { background: #fff8e0; }
    .color-chip.seafoam { background: #e9f4ef; }
    .color-chip.terracotta { background: #fceaea; }
    .color-chip.mauve { background: #f5ecf0; }
    .color-chip.citrus { background: #fff7e0; }
    .color-chip.active { border-color: #c8aa6e; transform: scale(1.07); }

    .font-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 8px;
    }
    .font-option {
      background: #2b2822;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 13px;
      cursor: pointer;
      color: #ece8e0;
    }
    .font-option.active { background: #c8aa6e; color: #0a0908; }
    textarea {
      width: 100%;
      background: #2b2822;
      border: 1px solid #4a443a;
      padding: 14px;
      color: #f2ede4;
      font-size: 16px;
      border-radius: 24px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      margin: 12px 0;
    }
    .publish-btn {
      width: 100%;
      background: #c8aa6e;
      border: none;
      padding: 14px;
      font-weight: 600;
      border-radius: 44px;
      margin-top: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .close-modal {
      position: absolute;
      top: 18px;
      right: 24px;
      font-size: 28px;
      cursor: pointer;
      color: #b9aa8c;
    }

    /* inline login / profile drawer (simple) */
    .user-drawer {
      position: fixed;
      bottom: 120px;
      right: 32px;
      background: #1a1814;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200,170,110,0.4);
      border-radius: 32px;
      padding: 18px 22px;
      width: 260px;
      z-index: 95;
      display: none;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.4);
    }
    .user-drawer.open { display: flex; }
    .drawer-name {
      font-weight: 600;
      font-size: 18px;
      font-family: 'Playfair Display', serif;
    }
    .edit-info {
      background: rgba(200,170,110,0.2);
      border: none;
      padding: 8px;
      border-radius: 40px;
      color: #e2cfaa;
      cursor: pointer;
      font-size: 12px;
    }
    .logout-btn {
      background: #3e2c22;
      border: none;
      padding: 8px;
      border-radius: 40px;
      color: #f3cd9b;
      cursor: pointer;
    }
    .login-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .login-small-btn {
      background: #c8aa6e;
      border: none;
      padding: 8px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      .wall-wrap { padding: 110px 20px 80px; }
      .floating-add { width: 56px; height: 56px; font-size: 32px; bottom: 24px; right: 24px; }
      .user-drawer { right: 20px; bottom: 100px; width: 240px; }
    }
  </style>
</head>
<body>

<div class="parallax-bg" id="parallaxBg"></div>
<div class="overlay-dark"></div>

<!-- HOME PAGE -->
<div class="page active" id="homePage">
  <div class="hero" id="homeHero">
    <div class="monumental-title">yuanxin’s<br>café</div>
  </div>
</div>

<!-- POSTCARD WALL PAGE (no heading) -->
<div class="page" id="feelingsPage">
  <div class="wall-wrap">
    <div class="post-grid" id="pFeed"></div>
  </div>
</div>

<!-- floating + button -->
<button class="floating-add" id="addPostBtn">+</button>

<!-- small user drawer (login / profile) -->
<div class="user-drawer" id="userDrawer">
  <div id="drawerContent"></div>
</div>

<!-- MODAL for creating postcard -->
<div class="modal-card" id="postModal">
  <div class="modal-inner">
    <span class="close-modal" onclick="closeModal('postModal')">&times;</span>
    <h3>✧ pin a thought</h3>
    <textarea id="newPostText" rows="3" placeholder="what’s on your mind?"></textarea>
    
    <div style="font-size: 13px;">choose paper color</div>
    <div class="color-palette" id="colorPalette"></div>

    <div style="font-size: 13px;">font style</div>
    <div class="font-row" id="fontOptions">
      <div class="font-option" data-font="serif">Serif</div>
      <div class="font-option" data-font="sans">Sans</div>
      <div class="font-option" data-font="modern">Modern</div>
      <div class="font-option" data-font="wavy">Italic</div>
    </div>
    <button class="publish-btn" id="doPublishBtn">✧ pin to wall ✧</button>
  </div>
</div>

<script>
  // ---------- SUPABASE CONFIG (REST + AUTH) ----------
  const SURL = 'https://kjgeitgrvljrqblbrcet.supabase.co';
  const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZ2VpdGdydmxqcnFibGJyY2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTUyNDAsImV4cCI6MjA5MDY5MTI0MH0.WcWqqXlNAW0CycEnMNkgkKeAUVqMx-FES0cl_Bjucvw';
  const sb = supabase.createClient(SURL, SKEY);

  let currentUser = null;
  let currentProfile = null;
  let sessionToken = null;

  // helpers
  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function timeAgo(ts) {
    const d = Date.now() - new Date(ts).getTime();
    const m = Math.floor(d/60000);
    if(m<1) return 'just now';
    if(m<60) return m+'m ago';
    const h = Math.floor(m/60);
    if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }
  function toast(msg) { alert(msg); }

  // direct REST call
  async function restCall(path, options = {}) {
    const headers = { 'apikey': SKEY, 'Content-Type': 'application/json' };
    if (sessionToken) headers['Authorization'] = 'Bearer ' + sessionToken;
    const res = await fetch(SURL + '/rest/v1/' + path, { ...options, headers });
    if (res.status === 204) return { success: true };
    const text = await res.text();
    if (!text || text.trim() === '') return options.method === 'GET' ? [] : { success: true };
    const data = JSON.parse(text);
    if (!res.ok) throw new Error(data.message || 'api error');
    return data;
  }

  async function updateSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      sessionToken = session.access_token;
      currentUser = session.user;
      await loadProfile();
    } else {
      sessionToken = null; currentUser = null; currentProfile = null;
    }
    renderDrawer();
  }

  async function loadProfile() {
    if (!currentUser) return;
    try {
      const data = await restCall(`profiles?id=eq.${currentUser.id}&limit=1`);
      if (data && data[0]) { currentProfile = data[0]; }
      else {
        const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
        await restCall('profiles', { method: 'POST', body: JSON.stringify({ id: currentUser.id, name, email: currentUser.email }) });
        currentProfile = { id: currentUser.id, name };
      }
    } catch(e) { console.warn(e); }
  }

  // ----- DRAWER (login / profile) -----
  function renderDrawer() {
    const container = document.getElementById('drawerContent');
    if (!container) return;
    if (currentUser && currentProfile) {
      container.innerHTML = `
        <div class="drawer-name">☕ ${esc(currentProfile.name || 'visitor')}</div>
        <button class="edit-info" id="editProfileBtn">edit info</button>
        <button class="logout-btn" id="drawerLogoutBtn">log out</button>
      `;
      document.getElementById('editProfileBtn')?.addEventListener('click', () => openEditProfile());
      document.getElementById('drawerLogoutBtn')?.addEventListener('click', () => doLogout());
    } else {
      container.innerHTML = `
        <div class="login-buttons">
          <input type="email" id="drawerEmail" placeholder="email" style="background:#2b2822; border:none; padding:8px; border-radius:40px; color:#ece8e0;">
          <input type="password" id="drawerPass" placeholder="password" style="background:#2b2822; border:none; padding:8px; border-radius:40px;">
          <button class="login-small-btn" id="drawerLoginBtn">log in</button>
          <div style="text-align:center; font-size:12px;">── or ──</div>
          <button class="login-small-btn" id="drawerGoogleBtn">google</button>
          <button class="edit-info" id="drawerRegisterBtn">create account</button>
        </div>
      `;
      document.getElementById('drawerLoginBtn')?.addEventListener('click', () => drawerLogin());
      document.getElementById('drawerGoogleBtn')?.addEventListener('click', () => googleLogin());
      document.getElementById('drawerRegisterBtn')?.addEventListener('click', () => openRegisterModal());
    }
  }

  async function drawerLogin() {
    const email = document.getElementById('drawerEmail').value.trim();
    const pass = document.getElementById('drawerPass').value;
    if (!email || !pass) { toast('enter email & password'); return; }
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { toast(error.message); return; }
    await updateSession();
    renderDrawer();
    if (document.getElementById('feelingsPage').classList.contains('active')) loadPosts();
  }

  async function googleLogin() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
    if (error) toast(error.message);
  }

  async function doLogout() {
    await sb.auth.signOut();
    sessionToken = null; currentUser = null; currentProfile = null;
    renderDrawer();
    document.getElementById('userDrawer').classList.remove('open');
    if (document.getElementById('feelingsPage').classList.contains('active')) loadPosts();
  }

  function openRegisterModal() {
    const name = prompt("first name");
    const last = prompt("last name (optional)");
    const email = prompt("email");
    const pass = prompt("password (min 6)");
    if (!name || !email || !pass || pass.length<6) { toast("invalid"); return; }
    const fullName = name + (last ? ' '+last : '');
    sb.auth.signUp({ email, password: pass, options: { data: { full_name: fullName } } })
      .then(({ error }) => { if(error) toast(error.message); else toast("account created! log in"); });
  }

  function openEditProfile() {
    const newName = prompt("edit your name", currentProfile?.name || '');
    if (newName && newName.trim() && currentUser) {
      restCall(`profiles?id=eq.${currentUser.id}`, { method: 'PATCH', body: JSON.stringify({ name: newName.trim() }) })
        .then(() => { loadProfile(); renderDrawer(); toast("profile updated"); });
    }
  }

  // ---- POSTCARD WALL (no heading, + button, drawer toggles) ----
  async function loadPosts() {
    const feed = document.getElementById('pFeed');
    feed.innerHTML = '<div style="text-align:center; padding:60px;">loading postcards...</div>';
    try {
      const posts = await restCall('posts?order=created_at.desc');
      if (!posts || posts.length === 0) { feed.innerHTML = '<div style="text-align:center; padding:60px;">no postcards yet. pin the first ✦</div>'; return; }
      feed.innerHTML = posts.map(post => {
        const canDelete = currentUser && currentUser.id === post.user_id;
        const randomRot = (Math.random() * 2 - 1) * 1.2;
        const colorClass = post.card_color || 'cream';
        const fontClass = post.font_style || 'serif';
        return `
          <div class="postcard ${colorClass}" style="--rot: ${randomRot}deg;">
            <div class="pin"></div>
            <div class="card-inner">
              <div class="post-content ${fontClass}">${esc(post.content)}</div>
              <div class="post-meta">
                <button class="author-name" data-user="${post.user_id}">${esc(post.author_name || 'anonymous')}</button>
                <span>${timeAgo(post.created_at)}</span>
                ${canDelete ? `<button class="delete-btn" data-id="${post.id}">✕ delete</button>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); deletePost(btn.dataset.id); });
      });
      document.querySelectorAll('.author-name').forEach(btn => {
        btn.addEventListener('click', () => { alert("author info – simple mode"); });
      });
    } catch(e) { feed.innerHTML = '<div style="text-align:center;">could not load, refresh</div>'; }
  }

  async function deletePost(id) {
    if (!currentUser || !confirm('remove this postcard?')) return;
    await restCall(`posts?id=eq.${id}&user_id=eq.${currentUser.id}`, { method: 'DELETE' });
    loadPosts();
  }

  // --- COMPOSE (color palette 12 colors) ---
  const colorList = ['cream','ivory','mint','lavender','peach','sky','rose','butter','seafoam','terracotta','mauve','citrus'];
  let selectedColor = 'cream';
  let selectedFont = 'serif';

  function buildColorPalette() {
    const container = document.getElementById('colorPalette');
    if(!container) return;
    container.innerHTML = colorList.map(c => `<div class="color-chip ${c}" data-color="${c}"></div>`).join('');
    document.querySelectorAll('.color-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        selectedColor = chip.dataset.color;
      });
    });
    document.querySelector('.color-chip.cream')?.classList.add('active');
  }

  document.querySelectorAll('.font-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.font-option').forEach(f => f.classList.remove('active'));
      opt.classList.add('active');
      selectedFont = opt.dataset.font;
    });
  });
  document.querySelector('.font-option.serif')?.classList.add('active');

  async function publishPostcard() {
    if (!currentUser) { toast('log in to pin a postcard'); document.getElementById('userDrawer').classList.add('open'); return; }
    const text = document.getElementById('newPostText').value.trim();
    if (!text) { toast('write something'); return; }
    const btn = document.getElementById('doPublishBtn');
    btn.innerText = 'pinning...';
    try {
      await restCall('posts', {
        method: 'POST',
        body: JSON.stringify({
          user_id: currentUser.id,
          author_name: currentProfile?.name || 'visitor',
          content: text,
          card_color: selectedColor,
          font_style: selectedFont
        })
      });
      document.getElementById('newPostText').value = '';
      closeModal('postModal');
      if (document.getElementById('feelingsPage').classList.contains('active')) loadPosts();
      else showPage('feelings');
    } catch(err) { toast('error'); } finally { btn.innerText = '✧ pin to wall ✧'; }
  }

  // ---- navigation & UI ----
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page + 'Page').classList.add('active');
    if (page === 'feelings') loadPosts();
  }
  function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
  
  document.getElementById('homeHero')?.addEventListener('click', () => showPage('feelings'));
  document.getElementById('addPostBtn')?.addEventListener('click', () => {
    if (!currentUser) { document.getElementById('userDrawer').classList.toggle('open'); }
    else { buildColorPalette(); document.getElementById('postModal').classList.add('open'); }
  });
  document.getElementById('doPublishBtn')?.addEventListener('click', publishPostcard);

  // background parallax
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 6;
    document.getElementById('parallaxBg').style.transform = `translate(${x}px, ${y}px)`;
  });

  // init
  sb.auth.onAuthStateChange(async () => { await updateSession(); if (document.getElementById('feelingsPage').classList.contains('active')) loadPosts(); });
  (async () => { await updateSession(); })();
  buildColorPalette();
</script>
</body>
</html>
