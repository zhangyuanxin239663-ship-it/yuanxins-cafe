<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>yuanxin's café · persistent wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0908;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .cloud-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.88) contrast(1.05);
      transition: transform 0.08s ease-out;
      will-change: transform;
      z-index: -2;
    }

    .dark-veil {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, rgba(10,9,8,0.2) 0%, rgba(10,9,8,0.7) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .page {
      display: none;
      width: 100%;
      min-height: 100vh;
    }
    .page.active {
      display: block;
    }

    .hero-home {
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0 5vw;
    }
    .monumental {
      font-family: 'Playfair Display', serif;
      font-size: clamp(70px, 13vw, 190px);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.05;
      background: linear-gradient(135deg, #fef3df 0%, #e9d5aa 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      transition: all 0.25s ease;
    }
    .monumental:hover {
      background: linear-gradient(135deg, #7aa2f7, #3b82f6, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      transform: scale(1.01);
    }

    .wall-container {
      position: relative;
      min-height: 100vh;
      width: 100%;
      padding: 40px 30px 140px 30px;
    }

    .login-corner-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #c8aa6e;
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      z-index: 150;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      font-family: 'Inter', sans-serif;
      color: #0a0908;
    }
    .user-corner-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e1b16ee;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200,170,110,0.5);
      padding: 10px 20px;
      border-radius: 60px;
      cursor: pointer;
      z-index: 150;
      font-size: 14px;
      color: #e2cfaa;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    .modal-overlay.open { display: flex; }
    .auth-modal {
      background: #1e1b16;
      border-radius: 48px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      border: 1px solid rgba(200,170,110,0.4);
    }
    .auth-modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 24px;
      color: #ece8e0;
    }
    .auth-modal input {
      width: 100%;
      background: #2b2822;
      border: 1px solid #4a443a;
      padding: 14px;
      border-radius: 60px;
      color: #ece8e0;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .auth-modal button {
      width: 100%;
      background: #c8aa6e;
      border: none;
      padding: 14px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .auth-modal .google-btn {
      background: #2b2822;
      color: #e2cfaa;
      border: 1px solid #c8aa6e;
    }
    .auth-modal .switch-text {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #b9aa8c;
    }
    .auth-modal .switch-text a {
      color: #c8aa6e;
      cursor: pointer;
    }
    .close-modal {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #b9aa8c;
      margin-top: -20px;
    }

    .sticky-note {
      position: absolute;
      min-width: 200px;
      max-width: 280px;
      background: #fffef7;
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 12px 24px -10px rgba(0,0,0,0.3);
      cursor: grab;
      z-index: 10;
      transition: box-shadow 0.1s;
    }
    @media (max-width: 680px) {
      .sticky-note { min-width: 170px; max-width: 220px; }
    }
    .sticky-note:active { cursor: grabbing; z-index: 999; }
    .note-cream { background: #fffef5; }
    .note-ivory { background: #fef7e8; }
    .note-mint { background: #f2f9f2; }
    .note-lavender { background: #f8f3fc; }
    .note-peach { background: #fff2e6; }
    .note-sky { background: #eef5ff; }
    .note-rose { background: #fff0f2; }
    .note-butter { background: #fff8e0; }
    .note-seafoam { background: #e9f4ef; }
    .note-terracotta { background: #fceaea; }
    .note-mauve { background: #f5ecf0; }
    .note-citrus { background: #fff7e0; }

    .pin-icon {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 28px;
      background: radial-gradient(circle, #e0b57a, #b87c4f);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      z-index: 12;
      border: 1px solid rgba(255,210,130,0.7);
      pointer-events: none;
    }

    .note-inner {
      padding: 28px 16px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .note-text {
      font-size: clamp(12px, 4vw, 16px);
      line-height: 1.45;
      word-break: break-word;
      font-family: 'Inter', sans-serif;
      color: #1f1e1a;
      max-height: 280px;
      overflow-y: auto;
    }
    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 10px;
      font-size: 9px;
      color: #5f5b4e;
      text-transform: uppercase;
    }
    .note-author {
      font-weight: 700;
      color: #b48c48;
      background: none;
      border: none;
      font-size: 9px;
      cursor: pointer;
    }
    .delete-note {
      background: none;
      border: none;
      font-size: 10px;
      color: #aa7a5c;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 40px;
    }
    .add-note {
      background: #e8e0d0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      min-width: 130px;
      max-width: 150px;
      height: 130px;
    }
    .add-plus { font-size: 48px; font-weight: 300; color: #6a5a44; }
    .inline-editor { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .inline-editor textarea {
      width: 100%;
      background: #fffef5;
      border: 1px solid #ddd6c8;
      padding: 10px;
      border-radius: 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: vertical;
    }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.selected { border-color: #c8aa6e; transform: scale(1.1); }
    .inline-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .inline-post-btn, .inline-cancel-btn {
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 11px;
    }
    .inline-post-btn { background: #c8aa6e; border: none; }
    .inline-cancel-btn { background: #4a443a; border: none; color: #ece8e0; }
    .toast-msg {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f1c17;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: 0.1s;
      color: #e2cfaa;
    }
  </style>
</head>
<body>

<div class="cloud-bg" id="cloudBg"></div>
<div class="dark-veil"></div>

<div class="page active" id="homePage">
  <div class="hero-home" id="homeTrigger">
    <div class="monumental">yuanxin’s café</div>
  </div>
</div>

<div class="page" id="feelingsPage">
  <div class="wall-container" id="wallContainer"></div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="auth-modal">
    <span class="close-modal" onclick="closeAuthModal()">&times;</span>
    <div id="authFormContent"></div>
  </div>
</div>

<div class="toast-msg" id="liveToast"></div>

<script>
  const SURL = 'https://kjgeitgrvljrqblbrcet.supabase.co';
  const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZ2VpdGdydmxqcnFibGJyY2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTUyNDAsImV4cCI6MjA5MDY5MTI0MH0.WcWqqXlNAW0CycEnMNkgkKeAUVqMx-FES0cl_Bjucvw';
  const sb = supabase.createClient(SURL, SKEY);

  let currentUser = null, currentProfile = null, sessionToken = null;
  let dragActive = false, currentDragElement = null, dragStartX = 0, dragStartY = 0, initialLeft = 0, initialTop = 0, currentDragId = null;

  function toastMsg(msg) {
    const t = document.getElementById('liveToast');
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
  }

  async function restCall(path, options = {}) {
    const headers = { 'apikey': SKEY, 'Content-Type': 'application/json' };
    if (sessionToken) headers['Authorization'] = 'Bearer ' + sessionToken;
    const res = await fetch(SURL + '/rest/v1/' + path, { ...options, headers });
    if (res.status === 204) return { success: true };
    const text = await res.text();
    if (!text || text.trim() === '') return options.method === 'GET' ? [] : { success: true };
    try {
      const data = JSON.parse(text);
      if (!res.ok) throw new Error(data.message || 'api error');
      return data;
    } catch(e) {
      if (options.method !== 'GET') return { success: true };
      throw e;
    }
  }

  async function updateSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      sessionToken = session.access_token;
      currentUser = session.user;
      await loadProfile();
    } else {
      sessionToken = null; currentUser = null; currentProfile = null;
    }
    updateUIButtons();
  }

  async function loadProfile() {
    if (!currentUser) return;
    try {
      const data = await restCall(`profiles?id=eq.${currentUser.id}&limit=1`);
      if (data && data[0]) currentProfile = data[0];
      else {
        const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
        await restCall('profiles', { method: 'POST', body: JSON.stringify({ id: currentUser.id, name, email: currentUser.email }) });
        currentProfile = { id: currentUser.id, name };
      }
    } catch(e) { console.warn(e); }
  }

  function updateUIButtons() {
    const feelingsPage = document.getElementById('feelingsPage');
    if (!feelingsPage.classList.contains('active')) return;
    let existing = document.getElementById('dynamicCornerBtn');
    if (existing) existing.remove();
    const btn = document.createElement('div');
    btn.id = 'dynamicCornerBtn';
    if (currentUser && currentProfile) {
      btn.className = 'user-corner-btn';
      btn.innerHTML = `☕ ${escapeHtml(currentProfile.name || 'guest')} ▼`;
      btn.onclick = () => {
        if (confirm(`Logged in as ${currentProfile.name}\n\nOK to edit name, Cancel to logout`)) {
          const newName = prompt('Enter new name:', currentProfile.name);
          if (newName && newName.trim()) {
            restCall(`profiles?id=eq.${currentUser.id}`, { method: 'PATCH', body: JSON.stringify({ name: newName.trim() }) })
              .then(() => { loadProfile(); updateUIButtons(); toastMsg('name updated'); });
          }
        } else {
          sb.auth.signOut().then(() => { sessionToken = null; currentUser = null; currentProfile = null; updateUIButtons(); loadAllNotes(); toastMsg('logged out'); });
        }
      };
    } else {
      btn.className = 'login-corner-btn';
      btn.innerHTML = '✧ log in / join ✧';
      btn.onclick = () => openAuthModal('login');
    }
    document.body.appendChild(btn);
  }

  function openAuthModal(mode) {
    const modal = document.getElementById('authModal');
    const content = document.getElementById('authFormContent');
    if (mode === 'login') {
      content.innerHTML = `<h2>welcome back</h2><input type="email" id="loginEmail" placeholder="email"><input type="password" id="loginPassword" placeholder="password"><button id="doLoginBtn">log in</button><button class="google-btn" id="googleLoginBtn">continue with google</button><div class="switch-text">new here? <a onclick="openAuthModal('register')">create account</a></div>`;
      document.getElementById('doLoginBtn')?.addEventListener('click', doLogin);
      document.getElementById('googleLoginBtn')?.addEventListener('click', googleLogin);
    } else {
      content.innerHTML = `<h2>join the café</h2><input type="text" id="regName" placeholder="full name"><input type="email" id="regEmail" placeholder="email"><input type="password" id="regPassword" placeholder="password (min 6)"><button id="doRegisterBtn">create account</button><button class="google-btn" id="googleRegBtn">continue with google</button><div class="switch-text">already a member? <a onclick="openAuthModal('login')">sign in</a></div>`;
      document.getElementById('doRegisterBtn')?.addEventListener('click', doRegister);
      document.getElementById('googleRegBtn')?.addEventListener('click', googleLogin);
    }
    modal.classList.add('open');
  }

  function closeAuthModal() { document.getElementById('authModal').classList.remove('open'); }
  
  async function doLogin() {
    const email = document.getElementById('loginEmail')?.value.trim();
    const pass = document.getElementById('loginPassword')?.value;
    if (!email || !pass) { toastMsg('enter email & password'); return; }
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { toastMsg(error.message); return; }
    await updateSession(); closeAuthModal();
    if (document.getElementById('feelingsPage').classList.contains('active')) loadAllNotes();
    toastMsg('welcome!');
  }
  
  async function doRegister() {
    const name = document.getElementById('regName')?.value.trim();
    const email = document.getElementById('regEmail')?.value.trim();
    const pass = document.getElementById('regPassword')?.value;
    if (!name || !email || !pass) { toastMsg('fill all fields'); return; }
    if (pass.length < 6) { toastMsg('password min 6'); return; }
    const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
    if (error) { toastMsg(error.message); return; }
    toastMsg('account created! please log in'); openAuthModal('login');
  }
  
  async function googleLogin() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
    if (error) toastMsg(error.message);
  }

  // DRAG WITH POSITION SAVING
  function makeDraggable(el, postId) {
    el.addEventListener('mousedown', (e) => {
      if (e.target.closest('.delete-note') || e.target.closest('.inline-editor')) return;
      e.preventDefault();
      dragActive = true;
      currentDragElement = el;
      currentDragId = postId;
      const rect = el.getBoundingClientRect();
      const containerRect = document.getElementById('wallContainer').getBoundingClientRect();
      initialLeft = rect.left - containerRect.left;
      initialTop = rect.top - containerRect.top;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      el.style.cursor = 'grabbing';
      el.style.zIndex = '1000';
    });
  }

  async function savePosition(postId, left, top) {
    if (!postId) return;
    try {
      await restCall(`posts?id=eq.${postId}`, {
        method: 'PATCH',
        body: JSON.stringify({ pos_x: Math.round(left), pos_y: Math.round(top) })
      });
    } catch(e) { 
      // Silently fail if columns don't exist yet - they will after SQL is run
      console.log('Position save skipped - columns may not exist yet');
    }
  }

  window.addEventListener('mousemove', (e) => {
    if (!dragActive || !currentDragElement) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    let newLeft = initialLeft + dx;
    let newTop = initialTop + dy;
    const container = document.getElementById('wallContainer');
    const maxLeft = container.clientWidth - currentDragElement.offsetWidth;
    const maxTop = container.clientHeight - currentDragElement.offsetHeight;
    newLeft = Math.min(Math.max(0, newLeft), maxLeft);
    newTop = Math.min(Math.max(0, newTop), maxTop);
    currentDragElement.style.left = newLeft + 'px';
    currentDragElement.style.top = newTop + 'px';
  });

  window.addEventListener('mouseup', async () => {
    if (dragActive && currentDragElement && currentDragId) {
      const left = parseFloat(currentDragElement.style.left);
      const top = parseFloat(currentDragElement.style.top);
      await savePosition(currentDragId, left, top);
      currentDragElement.style.cursor = 'grab';
      currentDragElement.style.zIndex = '';
      dragActive = false;
      currentDragElement = null;
      currentDragId = null;
    } else if (dragActive) {
      dragActive = false;
      if (currentDragElement) currentDragElement.style.cursor = 'grab';
      currentDragElement = null;
    }
  });

  function randomPosition(element, index) {
    const container = document.getElementById('wallContainer');
    if (!container) return { left: 20, top: 20 };
    const maxW = Math.max(container.clientWidth - element.offsetWidth, 100);
    const maxH = Math.max(container.clientHeight - element.offsetHeight, 200);
    const seed = (index * 131) % 1000;
    const left = (seed * 17) % maxW;
    const top = ((seed * 43) % maxH) + 30;
    return { left: Math.min(maxW - 20, left), top: Math.min(maxH - 40, top) };
  }

  const colorClasses = ['cream', 'ivory', 'mint', 'lavender', 'peach', 'sky', 'rose', 'butter', 'seafoam', 'terracotta', 'mauve', 'citrus'];
  
  async function loadAllNotes() {
    const container = document.getElementById('wallContainer');
    if (!container) return;
    container.innerHTML = '';
    try {
      const posts = await restCall('posts?order=created_at.desc');
      const notes = posts || [];
      for (let idx = 0; idx < notes.length; idx++) {
        const note = notes[idx];
        const canDelete = currentUser && currentUser.id === note.user_id;
        const colorClass = colorClasses[idx % colorClasses.length];
        const noteDiv = document.createElement('div');
        noteDiv.className = `sticky-note note-${colorClass}`;
        noteDiv.setAttribute('data-id', note.id);
        noteDiv.innerHTML = `
          <div class="pin-icon"></div>
          <div class="note-inner">
            <div class="note-text">${escapeHtml(note.content)}</div>
            <div class="note-footer">
              <button class="note-author">${escapeHtml(note.author_name || 'anonymous')}</button>
              <span>${timeAgo(note.created_at)}</span>
              ${canDelete ? `<button class="delete-note" data-del="${note.id}">✕</button>` : ''}
            </div>
          </div>
        `;
        container.appendChild(noteDiv);
        
        let leftPos, topPos;
        if (note.pos_x !== undefined && note.pos_x !== null && note.pos_y !== undefined && note.pos_y !== null) {
          leftPos = note.pos_x;
          topPos = note.pos_y;
          const maxLeft = container.clientWidth - noteDiv.offsetWidth;
          const maxTop = container.clientHeight - noteDiv.offsetHeight;
          leftPos = Math.min(Math.max(0, leftPos), maxLeft);
          topPos = Math.min(Math.max(0, topPos), maxTop);
        } else {
          const rand = randomPosition(noteDiv, idx);
          leftPos = rand.left;
          topPos = rand.top;
        }
        noteDiv.style.position = 'absolute';
        noteDiv.style.left = leftPos + 'px';
        noteDiv.style.top = topPos + 'px';
        noteDiv.style.cursor = 'grab';
        makeDraggable(noteDiv, note.id);
        
        noteDiv.querySelector('.delete-note')?.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!currentUser) { toastMsg('log in to delete'); openAuthModal('login'); return; }
          if (confirm('remove this note?')) {
            await restCall(`posts?id=eq.${note.id}&user_id=eq.${currentUser.id}`, { method: 'DELETE' });
            loadAllNotes();
            toastMsg('note removed');
          }
        });
      }
      
      // + ADD NOTE
      const addSticky = document.createElement('div');
      addSticky.className = 'sticky-note add-note';
      addSticky.innerHTML = `<div class="pin-icon"></div><div class="add-plus">+</div>`;
      container.appendChild(addSticky);
      const addPos = randomPosition(addSticky, notes.length + 999);
      addSticky.style.position = 'absolute';
      addSticky.style.left = addPos.left + 'px';
      addSticky.style.top = addPos.top + 'px';
      addSticky.style.cursor = 'pointer';
      
      addSticky.addEventListener('click', async () => {
        if (!currentUser) { toastMsg('please log in to post'); openAuthModal('login'); return; }
        if (addSticky.querySelector('.inline-editor')) return;
        addSticky.style.width = '270px';
        addSticky.style.height = 'auto';
        addSticky.style.minWidth = '240px';
        addSticky.style.maxWidth = '280px';
        addSticky.style.display = 'block';
        addSticky.innerHTML = `
          <div class="pin-icon"></div>
          <div class="note-inner">
            <div class="inline-editor">
              <textarea id="inlinePostText" rows="3" placeholder="what's on your mind?"></textarea>
              <div class="color-row" id="colorRow"></div>
              <div class="inline-actions">
                <button class="inline-cancel-btn" id="cancelPostBtn">cancel</button>
                <button class="inline-post-btn" id="submitPostBtn">pin it ✧</button>
              </div>
            </div>
          </div>
        `;
        const colorMap = { cream:'#fffef5', ivory:'#fef7e8', mint:'#f2f9f2', lavender:'#f8f3fc', peach:'#fff2e6', sky:'#eef5ff', rose:'#fff0f2', butter:'#fff8e0', seafoam:'#e9f4ef', terracotta:'#fceaea', mauve:'#f5ecf0', citrus:'#fff7e0' };
        let selectedColor = 'cream';
        const colorRow = document.getElementById('colorRow');
        colorClasses.forEach(c => {
          const dot = document.createElement('div');
          dot.className = 'color-dot';
          dot.style.backgroundColor = colorMap[c];
          dot.dataset.color = c;
          if (c === 'cream') dot.classList.add('selected');
          dot.addEventListener('click', () => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
            selectedColor = c;
          });
          colorRow.appendChild(dot);
        });
        document.getElementById('submitPostBtn').onclick = async () => {
          const text = document.getElementById('inlinePostText').value.trim();
          if (!text) { toastMsg('write something'); return; }
          await restCall('posts', {
            method: 'POST',
            body: JSON.stringify({
              user_id: currentUser.id,
              author_name: currentProfile?.name || 'visitor',
              content: text
            })
          });
          loadAllNotes();
          toastMsg('note pinned ✦');
        };
        document.getElementById('cancelPostBtn').onclick = () => loadAllNotes();
      });
    } catch(err) { 
      console.error(err);
      container.innerHTML = '<div style="padding:60px;text-align:center;">could not load notes, refresh</div>'; 
    }
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function timeAgo(ts) {
    const d = Date.now() - new Date(ts).getTime();
    const m = Math.floor(d/60000);
    if(m<1) return 'just now';
    if(m<60) return m+'m ago';
    const h = Math.floor(m/60);
    if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }

  const cloud = document.getElementById('cloudBg');
  document.addEventListener('mousemove', (e) => {
    const xPercent = (e.clientX / window.innerWidth - 0.5) * 2;
    const yPercent = (e.clientY / window.innerHeight - 0.5) * 1.5;
    const scale = 1 + Math.abs(xPercent) * 0.1 + Math.abs(yPercent) * 0.08;
    cloud.style.transform = `translate(${xPercent * 25}px, ${yPercent * 15}px) scale(${scale})`;
  });

  document.getElementById('homeTrigger')?.addEventListener('click', () => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('feelingsPage').classList.add('active');
    updateUIButtons();
    loadAllNotes();
  });

  sb.auth.onAuthStateChange(async () => { await updateSession(); if (document.getElementById('feelingsPage').classList.contains('active')) { updateUIButtons(); loadAllNotes(); } });
  (async () => { await updateSession(); })();
</script>
</body>
